<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CropXpert</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }

    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes fadeSlideUp {
      0%   { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0px); }
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #fff8f0 0%, #fff3e0 40%, #ffe9cc 70%, #fff0d6 100%);
      position: relative;
      overflow-x: hidden;
      font-family: 'Raleway', sans-serif;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      z-index: 0;
    }
    .blob-1 { width:700px; height:700px; background:radial-gradient(circle,#ff8c0030 0%,transparent 60%); top:-250px; left:-250px; }
    .blob-2 { width:500px; height:500px; background:radial-gradient(circle,#ff6a0022 0%,transparent 60%); bottom:-180px; right:-180px; }
    .blob-3 { width:350px; height:350px; background:radial-gradient(circle,#ffb34720 0%,transparent 60%); top:10%; right:10%; }
    .blob-4 { width:250px; height:250px; background:radial-gradient(circle,#ff990028 0%,transparent 60%); bottom:15%; left:8%; }

    .dot-grid {
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, #ff8c0018 1.5px, transparent 1.5px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    .cx-header {
      position: relative;
      z-index: 10;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 32px;
      border-bottom: 1px solid rgba(255,140,0,0.2);
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 2px 24px rgba(255,120,0,0.08);
      gap: 16px;
      animation: fadeSlideUp 0.7s ease forwards;
    }

    .logo-wrapper {
      position: relative;
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }
    .cx-ring {
      position: absolute;
      border-radius: 50%;
      box-sizing: border-box;
      animation: spinRing linear infinite;
    }
    .cx-ring-1 {
      inset: -6px;
      border: 2px solid transparent;
      border-top-color: #ff8c00;
      border-right-color: #ff6a00bb;
      animation-duration: 9s;
    }
    .cx-ring-2 {
      inset: -13px;
      border: 1.5px solid transparent;
      border-bottom-color: #ff990077;
      border-left-color: #ffb34755;
      animation-duration: 16s;
      animation-direction: reverse;
    }
    .logo-circle {
      position: absolute;
      top: 0; left: 0;
      width: 64px; height: 64px;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(145deg, #fff0d6, #ffd9a0);
      border: 2px solid rgba(255,140,0,0.55);
      box-shadow: 0 0 28px rgba(255,140,0,0.35), inset 0 0 14px rgba(255,140,0,0.1);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-img {
      display: block;
      width: 64px; height: 64px;
      object-fit: cover;
      object-position: center;
      border-radius: 50%;
    }
    .logo-fallback {
      display: none;
      font-size: 22px;
      font-weight: 900;
      color: #ff6a00;
      font-family: 'Playfair Display', serif;
    }
    .cx-header-title {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0.01em;
      line-height: 1;
      color: #1a1a1a;
      text-shadow: 0 2px 16px rgba(255,120,0,0.12);
      white-space: nowrap;
    }
    .cx-header-title span {
      color: #ff6a00;
      text-shadow: 0 0 28px rgba(255,106,0,0.4);
    }

    .cx-main {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      animation: fadeSlideUp 0.9s ease 0.2s both;
    }

    .cx-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      width: 100%;
      justify-content: center;
    }
    .cx-line-l { flex:1; max-width:100px; height:1px; background:linear-gradient(90deg,transparent,rgba(255,140,0,0.6)); }
    .cx-line-r { flex:1; max-width:100px; height:1px; background:linear-gradient(90deg,rgba(255,140,0,0.6),transparent); }
    .cx-gem { color:#ff8c00; font-size:14px; text-shadow:0 0 14px rgba(255,140,0,0.7); }

    .cx-desc-card {
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 24px;
      padding: 44px 52px;
      max-width: 600px;
      width: 100%;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(255,120,0,0.1), 0 1px 0 rgba(255,255,255,0.8) inset;
      text-align: center;
    }
    .cx-desc {
      color: #2d1a00;
      font-size: 17px;
      font-weight: 500;
      line-height: 1.82;
      margin-bottom: 14px;
      letter-spacing: 0.015em;
    }
    .cx-desc-sub {
      color: #7a4a10;
      font-size: 14.5px;
      font-weight: 300;
      line-height: 1.82;
      letter-spacing: 0.01em;
    }

    .login-btn {
      margin-top: 44px;
      background: linear-gradient(135deg, #ff8c00 0%, #ff4500 100%);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 15px 68px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.26em;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 4px 32px rgba(255,120,0,0.45);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      text-decoration: none;
    }
    .login-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg,rgba(255,255,255,0.2) 0%,transparent 55%);
      border-radius: 50px;
      pointer-events: none;
    }
    .login-btn:hover {
      background: linear-gradient(135deg, #ffaa00 0%, #ff6600 100%);
      box-shadow: 0 8px 44px rgba(255,140,0,0.6), 0 0 0 3px rgba(255,180,60,0.35);
      transform: translateY(-3px) scale(1.04);
      letter-spacing: 0.32em;
    }
    .login-btn:active { transform: translateY(-1px) scale(1.01); }

    .cx-footer {
      position: relative;
      z-index: 10;
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 22px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: fadeSlideUp 1s ease 0.4s both;
    }
    .cx-footer-text {
      color: #b06820;
      font-size: 12px;
      letter-spacing: 0.12em;
      font-family: 'Raleway', sans-serif;
      font-weight: 500;
    }
    .cx-footer-dot {
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(255,140,0,0.6);
    }

    @media (max-width: 500px) {
      .cx-header { padding: 16px 20px; gap: 12px; }
      .cx-header-title { font-size: 24px; }
      .logo-wrapper, .logo-circle { width: 48px; height: 48px; }
      .logo-img { width: 48px; height: 48px; }
      .cx-ring-1 { inset: -5px; }
      .cx-ring-2 { inset: -10px; }
      .cx-desc-card { padding: 28px 20px; }
      .cx-desc { font-size: 15px; }
      .login-btn { padding: 14px 44px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="dot-grid"></div>

  <header class="cx-header">
    <div class="logo-wrapper">
      <div class="cx-ring cx-ring-2"></div>
      <div class="cx-ring cx-ring-1"></div>
      <div class="logo-circle">
        <img
          src="images/logo.png"
          alt="CropXpert Logo"
          class="logo-img"
          onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';"
        />
        <span class="logo-fallback" id="logoFallback">CX</span>
      </div>
    </div>
    <h1 class="cx-header-title">Crop<span>Xpert</span></h1>
  </header>

  <main class="cx-main">
    <div class="cx-divider">
      <span class="cx-line-l"></span>
      <span class="cx-gem">✦</span>
      <span class="cx-line-r"></span>
    </div>

    <div class="cx-desc-card">
      <p class="cx-desc">
        Precision agriculture powered by intelligent crop analysis & real-time field insights.
      </p>
      <p class="cx-desc-sub">
        Empowering farmers to make data-driven decisions for healthier yields and sustainable growth.
      </p>
    </div>

    <a href="login.html" class="login-btn">LOGIN &nbsp;→</a>
  </main>

  <footer class="cx-footer">
    <span class="cx-footer-dot"></span>
    <span class="cx-footer-text">© 2026 CropXpert. All rights reserved.</span>
    <span class="cx-footer-dot"></span>
  </footer>

</body>
</html>
