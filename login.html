<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CropXpert – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }

    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes fadeSlideUp {
      0%   { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0px); }
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #fff8f0 0%, #fff3e0 40%, #ffe9cc 70%, #fff0d6 100%);
      position: relative;
      overflow-x: hidden;
      font-family: 'Raleway', sans-serif;
    }

    .blob { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); z-index: 0; }
    .blob-1 { width:700px; height:700px; background:radial-gradient(circle,#ff8c0030 0%,transparent 60%); top:-250px; left:-250px; }
    .blob-2 { width:500px; height:500px; background:radial-gradient(circle,#ff6a0022 0%,transparent 60%); bottom:-180px; right:-180px; }
    .blob-3 { width:350px; height:350px; background:radial-gradient(circle,#ffb34720 0%,transparent 60%); top:10%; right:10%; }
    .blob-4 { width:250px; height:250px; background:radial-gradient(circle,#ff990028 0%,transparent 60%); bottom:15%; left:8%; }

    .dot-grid {
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, #ff8c0018 1.5px, transparent 1.5px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    .cx-header {
      position: relative; z-index: 10;
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 20px 32px;
      border-bottom: 1px solid rgba(255,140,0,0.2);
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 2px 24px rgba(255,120,0,0.08);
      gap: 16px;
      animation: fadeSlideUp 0.7s ease forwards;
    }
    .logo-wrapper { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
    .cx-ring { position: absolute; border-radius: 50%; box-sizing: border-box; animation: spinRing linear infinite; }
    .cx-ring-1 { inset:-6px; border:2px solid transparent; border-top-color:#ff8c00; border-right-color:#ff6a00bb; animation-duration:9s; }
    .cx-ring-2 { inset:-13px; border:1.5px solid transparent; border-bottom-color:#ff990077; border-left-color:#ffb34755; animation-duration:16s; animation-direction:reverse; }
    .logo-circle {
      position: absolute; top:0; left:0;
      width:64px; height:64px; border-radius:50%; overflow:hidden;
      background: linear-gradient(145deg,#fff0d6,#ffd9a0);
      border: 2px solid rgba(255,140,0,0.55);
      box-shadow: 0 0 28px rgba(255,140,0,0.35), inset 0 0 14px rgba(255,140,0,0.1);
      z-index:2; display:flex; align-items:center; justify-content:center;
    }
    .logo-img { display:block; width:64px; height:64px; object-fit:cover; object-position:center; border-radius:50%; }
    .logo-initials { display:none; font-size:22px; font-weight:900; color:#ff6a00; font-family:'Playfair Display',serif; }
    .cx-header-title { font-family:'Playfair Display',serif; font-size:36px; font-weight:900; letter-spacing:0.01em; line-height:1; color:#1a1a1a; white-space:nowrap; }
    .cx-header-title span { color:#ff6a00; text-shadow:0 0 28px rgba(255,106,0,0.4); }

    /* ── Main ── */
    .cx-main {
      position: relative; z-index: 10;
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 24px;
      animation: fadeSlideUp 0.9s ease 0.2s both;
    }

    /* ── Glass Login Card ── */
    .login-card {
      background: rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 28px;
      padding: 44px 48px 40px;
      max-width: 460px;
      width: 100%;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 8px 40px rgba(255,120,0,0.12), 0 1px 0 rgba(255,255,255,0.9) inset;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .login-heading {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 900;
      color: #1a1a1a; margin-bottom: 6px; text-align: center;
    }
    .login-heading span { color: #ff6a00; }

    .login-sub {
      font-size: 13px; color: #7a4a10;
      font-weight: 300; margin-bottom: 32px;
      text-align: center; letter-spacing: 0.02em;
    }

    /* ── Inputs ── */
    .input-group {
      width: 100%;
      display: flex; flex-direction: column;
      gap: 16px; margin-bottom: 8px;
    }
    .input-label {
      font-size: 11px; font-weight: 700;
      color: #7a4a10; letter-spacing: 0.1em;
      margin-bottom: 6px; display: block;
      text-transform: uppercase;
    }
    .input-wrap { position: relative; width: 100%; }
    .cx-input {
      width: 100%;
      padding: 13px 18px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,140,0,0.25);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      font-size: 14px;
      font-family: 'Raleway', sans-serif;
      color: #2d1a00; outline: none;
      transition: all 0.25s ease;
      letter-spacing: 0.02em;
    }
    .cx-input::placeholder { color: #c4956a; font-weight: 300; }
    .cx-input:focus {
      border-color: #ff8c00;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 0 0 3px rgba(255,140,0,0.15);
    }
    .cx-input.error {
      border-color: #ff4444;
      box-shadow: 0 0 0 3px rgba(255,68,68,0.12);
    }
    .pass-input { padding-right: 50px; }
    .eye-btn {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; font-size: 16px;
      padding: 4px; color: #b06820;
      transition: color 0.2s; line-height: 1;
    }
    .eye-btn:hover { color: #ff6a00; }

    /* ── Forgot ── */
    .forgot-wrap {
      width: 100%; display: flex;
      justify-content: flex-end;
      margin-top: 8px; margin-bottom: 28px;
    }
    .forgot-link {
      font-size: 12px; color: #ff6a00;
      font-weight: 700; cursor: pointer;
      text-decoration: none; transition: opacity 0.2s;
    }
    .forgot-link:hover { opacity: 0.65; }

    /* ── Login Button ── */
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #ff8c00 0%, #ff4500 100%);
      color: #fff; border: none; border-radius: 50px;
      padding: 15px; font-size: 13px; font-weight: 700;
      letter-spacing: 0.26em; cursor: pointer;
      font-family: 'Raleway', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 4px 32px rgba(255,120,0,0.4);
      display: flex; align-items: center; justify-content: center;
      gap: 10px; position: relative; overflow: hidden;
      margin-bottom: 24px;
    }
    .login-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg,rgba(255,255,255,0.2) 0%,transparent 55%);
      border-radius: 50px; pointer-events: none;
    }
    .login-btn:hover {
      background: linear-gradient(135deg, #ffaa00 0%, #ff6600 100%);
      box-shadow: 0 8px 44px rgba(255,140,0,0.55), 0 0 0 3px rgba(255,180,60,0.3);
      transform: translateY(-2px) scale(1.02);
      letter-spacing: 0.3em;
    }
    .login-btn:active { transform: translateY(0) scale(1); }

    /* ── No Account ── */
    .no-account {
      display: flex; align-items: center;
      justify-content: center; gap: 6px;
      font-size: 13px; color: #7a4a10; font-weight: 400;
    }
    .create-link {
      color: #ff6a00; font-weight: 700;
      text-decoration: none; transition: opacity 0.2s;
      letter-spacing: 0.02em;
    }
    .create-link:hover { opacity: 0.7; }

    /* ── Footer ── */
    .cx-footer {
      position: relative; z-index: 10; width: 100%;
      border-top: 1px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: 22px 40px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      animation: fadeSlideUp 1s ease 0.4s both;
    }
    .cx-footer-text { color:#b06820; font-size:12px; letter-spacing:0.12em; font-weight:500; }
    .cx-footer-dot { display:inline-block; width:4px; height:4px; border-radius:50%; background:rgba(255,140,0,0.6); }

    @media (max-width: 500px) {
      .cx-header { padding: 16px 20px; gap: 12px; }
      .cx-header-title { font-size: 24px; }
      .logo-wrapper, .logo-circle { width: 48px; height: 48px; }
      .logo-img { width: 48px; height: 48px; }
      .cx-ring-1 { inset: -5px; }
      .cx-ring-2 { inset: -10px; }
      .login-card { padding: 32px 20px 28px; }
      .login-heading { font-size: 22px; }
      .cx-input { font-size: 13px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="dot-grid"></div>

  <!-- Header -->
  <header class="cx-header">
    <div class="logo-wrapper">
      <div class="cx-ring cx-ring-2"></div>
      <div class="cx-ring cx-ring-1"></div>
      <div class="logo-circle">
        <img
          src="images/logo.png"
          alt="CropXpert Logo"
          class="logo-img"
          onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';"
        />
        <span class="logo-initials" id="logoFallback">CX</span>
      </div>
    </div>
    <h1 class="cx-header-title">Crop<span>Xpert</span></h1>
  </header>

  <!-- Main -->
  <main class="cx-main">
    <div class="login-card">

      <h2 class="login-heading">Welcome <span>Back</span></h2>
      <p class="login-sub">Sign in to your CropXpert account</p>

      <!-- Inputs -->
      <div class="input-group">
        <div>
          <label class="input-label" for="emailInput">Email Address</label>
          <div class="input-wrap">
            <input
              type="email"
              id="emailInput"
              class="cx-input"
              placeholder="you@example.com"
            />
          </div>
        </div>
        <div>
          <label class="input-label" for="passInput">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="passInput"
              class="cx-input pass-input"
              placeholder="Enter your password"
            />
            <button class="eye-btn" type="button" onclick="togglePass()" id="eyeBtn">👁️</button>
          </div>
        </div>
      </div>

      <!-- Forgot -->
      <div class="forgot-wrap">
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Login Button -->
      <button class="login-btn" type="button" onclick="handleLogin()">
        LOGIN &nbsp;→
      </button>

      <!-- No account -->
      <div class="no-account">
        <span>No account?</span>
        <a href="signup.html" class="create-link">Create Account</a>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="cx-footer">
    <span class="cx-footer-dot"></span>
    <span class="cx-footer-text">© 2026 CropXpert. All rights reserved.</span>
    <span class="cx-footer-dot"></span>
  </footer>

  <script>
    // Show / hide password
    function togglePass() {
      const input = document.getElementById('passInput');
      const btn   = document.getElementById('eyeBtn');
      if (input.type === 'password') {
        input.type      = 'text';
        btn.textContent = '🙈';
      } else {
        input.type      = 'password';
        btn.textContent = '👁️';
      }
    }

    // Login with backend
    async function handleLogin() {

    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passInput").value.trim();

    // Validation
    if (!email) {
        markError("emailInput");
        return;
    }

    if (!password) {
        markError("passInput");
        return;
    }

    try {

        const response = await fetch("http://127.0.0.1:5000/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await response.json();

        if (data.status === "success") {

            alert("Login Successful ");

            // Store user info
            localStorage.setItem("user_id", data.user_id);
            localStorage.setItem("user_name", data.name);
            localStorage.setItem("user_email", email);

            // Redirect to home page
            window.location.href = "index.html";

        } else {
            alert(data.message || "Invalid credentials");
        }

    } catch (err) {
        console.error(err);
        alert("Server error. Please try again.");
    }
}
    // Red border on error field
    function markError(id) {
      const el = document.getElementById(id);
      el.classList.add('error');
      el.focus();
      el.addEventListener('input', function clear() {
        el.classList.remove('error');
        el.removeEventListener('input', clear);
      });
    }
  </script>

</body>
</html>
